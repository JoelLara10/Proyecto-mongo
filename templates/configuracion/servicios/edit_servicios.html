{% extends "configuracion/header_configuracion.html" %}

{% block content %}

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-10">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0">
                        <i class="fas fa-edit"></i> Editar Servicio #{{ servicio.id_serv }}
                    </h4>
                </div>

                <div class="card-body">
                    <form method="POST">
                        <div class="row">
                            <!-- Columna 1 -->
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Clave</label>
                                    <input type="text" name="clave" class="form-control"
                                           value="{{ servicio.serv_cve }}" required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Descripción</label>
                                    <input type="text" name="descripcion" class="form-control"
                                           value="{{ servicio.serv_desc }}" required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Costo Principal</label>
                                    <input type="number" step="0.01" name="costo" class="form-control"
                                           value="{{ servicio.serv_costo }}" required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Unidad de Medida</label>
                                    <select name="med" class="form-control" required>
                                        <option value="{{ servicio.serv_umed }}" selected>{{ servicio.serv_umed }}</option>
                                        <option value="CONSULTA">CONSULTA</option>
                                        <option value="EQUIPO">EQUIPO</option>
                                        <option value="ESTUDIO">ESTUDIO</option>
                                        <option value="HORA">HORA</option>
                                        <option value="SERVICIO">SERVICIO</option>
                                    </select>
                                </div>
                            </div>

                            <!-- Columna 2 -->
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">Tipo</label>
                                    <select name="tipo" class="form-control" required>
                                        <option value="">Seleccionar</option>
                                        {% for t in tipos %}
                                            <option value="{{ t.ser_type_id }}"
                                                {% if t.ser_type_id == servicio.tipo|int %}selected{% endif %}>
                                                {{ t.ser_type_desc }}
                                            </option>
                                        {% endfor %}
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Proveedor</label>
                                    <select name="proveedor" class="form-control">
                                        <option value="">Seleccionar</option>
                                        {% for p in proveedores %}
                                            <option value="{{ p.id_prov }}"
                                                {% if p.id_prov == servicio.proveedor|int %}selected{% endif %}>
                                                {{ p.nom_prov }}
                                            </option>
                                        {% endfor %}
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Grupo</label>
                                    <select name="grupo" class="form-control">
                                        <option value="{{ servicio.grupo }}" selected>{{ servicio.grupo }}</option>
                                        <option value="SERVICIOS HOSPITALARIOS">SERVICIOS HOSPITALARIOS</option>
                                        <option value="IMAGENOLOGIA">IMAGENOLOGIA</option>
                                    </select>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Código SAT</label>
                                    <input type="text" name="codigo_sat" class="form-control"
                                           value="{{ servicio.codigo_sat }}">
                                </div>

                                <div class="mb-3">
                                    <label class="form-label">Clave Unidad SAT</label>
                                    <input type="text" name="c_cveuni" class="form-control"
                                           value="{{ servicio.c_cveuni }}">
                                </div>
                            </div>
                        </div>

                        <!-- Costos adicionales -->
                        <h6 class="text-primary mt-3">Costos adicionales</h6>
                        <div class="row">
                            {% for i in range(2, 9) %}
                            <div class="col-md-3 mb-2">
                                <label class="small">Costo {{ i }}</label>
                                <input type="number" step="0.01" name="costo{{ i }}" class="form-control"
                                       value="{{ servicio['serv_costo' ~ i] or 0 }}">
                            </div>
                            {% endfor %}
                        </div>

                        <div class="text-center mt-4">
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-save"></i> Guardar Cambios
                            </button>
                            <a href="{{ url_for('cat_servicios') }}" class="btn btn-danger">
                                <i class="fas fa-times"></i> Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
