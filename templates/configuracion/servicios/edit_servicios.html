{% extends "configuracion/header_configuracion.html" %}

{% block content %}

<style>
  * {
    font-family: 'Inter', sans-serif;
  }

  body {
    background: transparent;
  }

  /* Título principal */
  .page-title {
    color: white;
    font-size: 2rem;
    font-weight: 700;
    margin-bottom: 1.5rem;
    text-shadow: 0 2px 10px rgba(0, 0, 0, 0.2);
    display: flex;
    align-items: center;
  }

  .page-title i {
    margin-right: 1rem;
    font-size: 2.5rem;
    background: rgba(255, 255, 255, 0.2);
    padding: 0.5rem;
    border-radius: 15px;
  }

  /* Tarjeta principal */
  .main-card {
    background: rgba(255, 255, 255, 0.95);
    backdrop-filter: blur(10px);
    border: none;
    border-radius: 25px;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
    max-width: 1000px;
    margin: 20px auto;
    animation: fadeIn 0.5s ease;
  }

  .card-header-custom {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 1.5rem 2rem;
    color: white;
    border: none;
  }

  .card-header-custom h4 {
    margin: 0;
    font-weight: 700;
    font-size: 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }

  .card-header-custom i {
    font-size: 1.8rem;
    background: rgba(255, 255, 255, 0.2);
    padding: 0.5rem;
    border-radius: 12px;
  }

  .card-body-custom {
    padding: 2rem;
    background: white;
  }

  /* Secciones del formulario */
  .form-section {
    background: #f7fafc;
    border-radius: 16px;
    padding: 1.5rem;
    margin-bottom: 1.5rem;
    border-left: 4px solid #667eea;
    transition: all 0.3s ease;
  }

  .form-section:hover {
    background: #ffffff;
    box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
  }

  .section-title {
    color: #667eea;
    font-weight: 700;
    margin-bottom: 1.2rem;
    font-size: 1.1rem;
    display: flex;
    align-items: center;
    gap: 0.8rem;
  }

  .section-title i {
    background: rgba(102, 126, 234, 0.1);
    padding: 0.5rem;
    border-radius: 10px;
    color: #667eea;
    font-size: 1.1rem;
  }

  /* Etiquetas */
  .form-label-custom {
    font-weight: 600;
    color: #2d3748;
    margin-bottom: 0.5rem;
    font-size: 0.9rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .form-label-custom i {
    color: #667eea;
    font-size: 0.9rem;
    width: 16px;
  }

  .form-label-custom span {
    color: #e53e3e;
    margin-left: 0.2rem;
  }

  /* Campos de formulario */
  .form-control-custom, .form-select-custom {
    width: 100%;
    padding: 0.8rem 1rem;
    border: 2px solid #e2e8f0;
    border-radius: 12px;
    transition: all 0.3s ease;
    background: white;
    font-size: 0.95rem;
  }

  .form-control-custom:focus, .form-select-custom:focus {
    border-color: #667eea;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
    outline: none;
  }

  .form-control-custom[readonly] {
    background-color: #f7fafc;
    cursor: not-allowed;
  }

  .form-control-custom::placeholder {
    color: #a0aec0;
  }

  /* Badge para el ID */
  .id-badge {
    background: rgba(255, 255, 255, 0.2);
    padding: 0.3rem 1rem;
    border-radius: 30px;
    font-size: 0.9rem;
    font-weight: 500;
    margin-left: 1rem;
  }

  /* Costos adicionales */
  .costos-section {
    background: #f7fafc;
    border-radius: 16px;
    padding: 1.5rem;
    margin-top: 1rem;
  }

  .costos-title {
    color: #667eea;
    font-weight: 700;
    margin-bottom: 1.2rem;
    font-size: 1rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .costos-title i {
    background: rgba(102, 126, 234, 0.1);
    padding: 0.4rem;
    border-radius: 8px;
  }

  .costo-item {
    background: white;
    border-radius: 12px;
    padding: 0.8rem;
    border: 1px solid #e2e8f0;
  }

  .costo-item label {
    font-size: 0.8rem;
    color: #718096;
    margin-bottom: 0.3rem;
    display: block;
  }

  /* Botones de acción */
  .btn-actions {
    text-align: center;
    background: #f7fafc;
    padding: 1.5rem;
    border-radius: 16px;
    margin-top: 2rem;
    display: flex;
    gap: 1rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .btn-save {
    background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 0.8rem 2rem;
    font-weight: 600;
    font-size: 1rem;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(72, 187, 120, 0.3);
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
    text-decoration: none;
  }

  .btn-save:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(72, 187, 120, 0.4);
    color: white;
  }

  .btn-cancel {
    background: linear-gradient(135deg, #f56565 0%, #e53e3e 100%);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 0.8rem 2rem;
    font-weight: 600;
    font-size: 1rem;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(229, 62, 62, 0.3);
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    cursor: pointer;
    text-decoration: none;
  }

  .btn-cancel:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(229, 62, 62, 0.4);
    color: white;
  }

  /* Animaciones */
  @keyframes fadeIn {
    from {
      opacity: 0;
      transform: translateY(20px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  /* Responsive */
  @media (max-width: 768px) {
    .page-title {
      font-size: 1.5rem;
    }

    .card-body-custom {
      padding: 1rem;
    }

    .form-section {
      padding: 1rem;
    }

    .btn-actions {
      flex-direction: column;
    }

    .btn-save, .btn-cancel {
      width: 100%;
      justify-content: center;
    }

    .card-header-custom h4 {
      font-size: 1.2rem;
      flex-wrap: wrap;
    }

    .id-badge {
      margin-left: 0;
      margin-top: 0.5rem;
    }
  }
</style>

<div class="container-fluid mt-4">
  <!-- Título de la página -->
  <div class="page-title text-primary">
    <i class="fas fa-edit text-primary"></i>
    Editar Servicio
  </div>

  <!-- Tarjeta principal -->
  <div class="main-card">
    <div class="card-header-custom">
      <h4>
        <i class="fas fa-cogs"></i>
        Editando servicio #{{ servicio.id_serv }}
        <span class="id-badge">{{ servicio.serv_cve }}</span>
      </h4>
    </div>

    <div class="card-body-custom">
      <form method="POST">
        <!-- Información básica -->
        <div class="form-section">
          <div class="section-title">
            <i class="fas fa-info-circle"></i>
            Información básica
          </div>

          <div class="row">
            <div class="col-md-6">
              <div class="mb-3">
                <label class="form-label-custom">
                  <i class="fas fa-hashtag"></i>
                  Clave <span>*</span>
                </label>
                <input type="text" name="clave" class="form-control-custom"
                       value="{{ servicio.serv_cve }}" required placeholder="Ej. SERV-001">
              </div>

              <div class="mb-3">
                <label class="form-label-custom">
                  <i class="fas fa-align-left"></i>
                  Descripción <span>*</span>
                </label>
                <input type="text" name="descripcion" class="form-control-custom"
                       value="{{ servicio.serv_desc }}" required placeholder="Nombre del servicio">
              </div>

              <div class="mb-3">
                <label class="form-label-custom">
                  <i class="fas fa-dollar-sign"></i>
                  Costo Principal <span>*</span>
                </label>
                <input type="number" step="0.01" name="costo" class="form-control-custom"
                       value="{{ servicio.serv_costo }}" required placeholder="0.00">
              </div>
            </div>

            <div class="col-md-6">
              <div class="mb-3">
                <label class="form-label-custom">
                  <i class="fas fa-ruler"></i>
                  Unidad de Medida <span>*</span>
                </label>
                <select name="med" class="form-select-custom" required>
                  <option value="{{ servicio.serv_umed }}" selected>{{ servicio.serv_umed }}</option>
                  <option value="CONSULTA">CONSULTA</option>
                  <option value="EQUIPO">EQUIPO</option>
                  <option value="ESTUDIO">ESTUDIO</option>
                  <option value="HORA">HORA</option>
                  <option value="SERVICIO">SERVICIO</option>
                </select>
              </div>

              <div class="mb-3">
                <label class="form-label-custom">
                  <i class="fas fa-tag"></i>
                  Tipo <span>*</span>
                </label>
                <select name="tipo" class="form-select-custom" required>
                  <option value="">Seleccionar</option>
                  {% for t in tipos %}
                    <option value="{{ t.ser_type_id }}"
                        {% if t.ser_type_id == servicio.tipo|int %}selected{% endif %}>
                      {{ t.ser_type_desc }}
                    </option>
                  {% endfor %}
                </select>
              </div>

              <div class="mb-3">
                <label class="form-label-custom">
                  <i class="fas fa-building"></i>
                  Proveedor
                </label>
                <select name="proveedor" class="form-select-custom">
                  <option value="">Seleccionar</option>
                  {% for p in proveedores %}
                    <option value="{{ p.id_prov }}"
                        {% if p.id_prov == servicio.proveedor|int %}selected{% endif %}>
                      {{ p.nom_prov }}
                    </option>
                  {% endfor %}
                </select>
              </div>
            </div>
          </div>
        </div>

        <!-- Información fiscal -->
        <div class="form-section">
          <div class="section-title">
            <i class="fas fa-file-invoice"></i>
            Información fiscal
          </div>

          <div class="row">
            <div class="col-md-4">
              <div class="mb-3">
                <label class="form-label-custom">
                  <i class="fas fa-layer-group"></i>
                  Grupo
                </label>
                <select name="grupo" class="form-select-custom">
                  <option value="{{ servicio.grupo }}" selected>{{ servicio.grupo }}</option>
                  <option value="SERVICIOS HOSPITALARIOS">SERVICIOS HOSPITALARIOS</option>
                  <option value="IMAGENOLOGIA">IMAGENOLOGIA</option>
                </select>
              </div>
            </div>

            <div class="col-md-4">
              <div class="mb-3">
                <label class="form-label-custom">
                  <i class="fas fa-barcode"></i>
                  Código SAT
                </label>
                <input type="text" name="codigo_sat" class="form-control-custom"
                       value="{{ servicio.codigo_sat }}" placeholder="Ej. 85101500">
              </div>
            </div>

            <div class="col-md-4">
              <div class="mb-3">
                <label class="form-label-custom">
                  <i class="fas fa-key"></i>
                  Clave Unidad SAT
                </label>
                <input type="text" name="c_cveuni" class="form-control-custom"
                       value="{{ servicio.c_cveuni }}" placeholder="Ej. E48">
              </div>
            </div>
          </div>
        </div>

        <!-- Costos adicionales -->
        <div class="costos-section">
          <div class="costos-title">
            <i class="fas fa-coins"></i>
            Costos adicionales
          </div>

          <div class="row">
            {% for i in range(2, 9) %}
            <div class="col-md-3 mb-3">
              <div class="costo-item">
                <label>Costo {{ i }}</label>
                <div class="input-group">
                  <span class="input-group-text bg-light border-0 rounded-start-12">$</span>
                  <input type="number" step="0.01" name="costo{{ i }}" class="form-control-custom border-start-0"
                         value="{{ servicio['serv_costo' ~ i] or 0 }}" placeholder="0.00">
                </div>
              </div>
            </div>
            {% endfor %}
          </div>
        </div>

        <!-- Botones de acción -->
        <div class="btn-actions">
          <button type="submit" class="btn-save">
            <i class="fas fa-save"></i>
            Guardar Cambios
          </button>
          <a href="{{ url_for('cat_servicios') }}" class="btn-cancel">
            <i class="fas fa-times"></i>
            Cancelar
          </a>
        </div>
      </form>
    </div>
  </div>
</div>

{% endblock %}
