<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Usuario</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container mt-5">

<form method="POST" enctype="multipart/form-data" class="card shadow p-4">

    <!-- HEADER -->
    <div class="mb-4 border-bottom pb-3">
        <h5 class="text-primary">
            <i class="fas fa-user-edit"></i> Editar Usuario
        </h5>

        <div class="row mt-2">
            <div class="col-md-4"><strong>No:</strong> {{ usuario.id_usua }}</div>
            <div class="col-md-4"><strong>Usuario:</strong> {{ usuario.usuario }}</div>
            <div class="col-md-4"><strong>Nombre:</strong> {{ usuario.nombre }}</div>
        </div>
    </div>

    <!-- CURP -->
    <div class="mb-3">
        <label class="form-label">CURP</label>
        <input type="text" name="curp_u" value="{{ usuario.curp_u }}" class="form-control">
    </div>

    <!-- NOMBRES -->
    <div class="row mb-3">
        <div class="col-md-4">
            <label class="form-label">Primer Apellido</label>
            <input type="text" name="papell" value="{{ usuario.papell }}" class="form-control">
        </div>
        <div class="col-md-4">
            <label class="form-label">Segundo Apellido</label>
            <input type="text" name="sapell" value="{{ usuario.sapell }}" class="form-control">
        </div>
        <div class="col-md-4">
            <label class="form-label">Nombre(s)</label>
            <input type="text" name="nombre" value="{{ usuario.nombre }}" class="form-control">
        </div>
    </div>

    <!-- ROL -->
    <div class="mb-3">
        <label class="form-label">Rol</label>
        <select name="id_rol" class="form-select">
            {% for rol in roles %}
            <option value="{{ rol.id_rol }}" {% if rol.id_rol == usuario.id_rol %}selected{% endif %}>
                {{ rol.rol }}
            </option>
            {% endfor %}
        </select>
    </div>

    <!-- ARCHIVOS -->
    <div class="row mb-4">
        <div class="col-md-6">
            <label class="form-label">Imagen de perfil</label>
            <input type="file" name="img_perfil" class="form-control">
        </div>
        <div class="col-md-6">
            <label class="form-label">Firma</label>
            <input type="file" name="firma" class="form-control">
        </div>
    </div>

    <!-- BOTONES -->
    <div class="d-flex justify-content-between">
        <a href="{{ url_for('alta_usuarios') }}" class="btn btn-secondary">
            <i class="fas fa-arrow-left"></i> Cancelar
        </a>

        <button class="btn btn-success">
            <i class="fas fa-save"></i> Guardar Cambios
        </button>
    </div>

</form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
