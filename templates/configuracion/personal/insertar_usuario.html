<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Alta de Usuario</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://use.fontawesome.com/releases/v5.15.4/css/all.css" rel="stylesheet">
</head>

<body>

<div class="container mt-4">

    <h4 class="mb-4 text-center">ALTA DE USUARIO</h4>

    <form action="{{ url_for('insertar_usuario') }}" method="POST" enctype="multipart/form-data">

        <div class="row">

            <!-- DATOS PERSONALES -->
            <div class="col-md-6">

                <div class="mb-3">
                    <label class="form-label">CURP</label>
                    <input type="text" name="curp_u" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Nombre(s)</label>
                    <input type="text" name="nombre" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Primer Apellido</label>
                    <input type="text" name="papell" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Segundo Apellido</label>
                    <input type="text" name="sapell" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Fecha de nacimiento</label>
                    <input type="date" name="fecnac" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Matrícula</label>
                    <input type="text" name="mat" class="form-control">
                </div>

                <div class="mb-3">
                    <label class="form-label">Cédula Profesional</label>
                    <input type="text" name="cedp" class="form-control">
                </div>

            </div>

            <!-- DATOS DEL SISTEMA -->
            <div class="col-md-6">

                <div class="mb-3">
                    <label class="form-label">Cargo</label>
                    <input type="text" name="cargp" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Teléfono</label>
                    <input type="text" name="tel" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Correo</label>
                    <input type="email" name="email" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Pregunta de seguridad</label>
                    <input type="text" name="pre" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Usuario</label>
                    <input type="text" name="usuario" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Contraseña</label>
                    <input type="password" name="pass" class="form-control" required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Rol</label>
                    <select name="id_rol" class="form-select" required>
                        <option value="">Seleccionar</option>
                        {% for rol in roles %}
                            <option value="{{ rol.id_rol }}">{{ rol.rol }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Imagen de perfil</label>
                    <input type="file" name="img_perfil" class="form-control" accept="image/*">
                </div>

                <div class="mb-3">
                    <label class="form-label">Firma</label>
                    <input type="file" name="firma" class="form-control" accept="image/*">
                </div>

            </div>

        </div>

        <div class="text-end mt-4">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> Guardar
            </button>
            <a href="{{ url_for('alta_usuario') }}" class="btn btn-secondary">
                Cancelar
            </a>
        </div>

    </form>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
