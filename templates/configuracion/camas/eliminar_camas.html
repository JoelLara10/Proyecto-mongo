<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Administrar camas</title>
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.0/css/all.css">
<style>
  body { background:#f4f6fb; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
  
  /* Contenedores */
  .form-container, .elimina-cama-box { 
    background:#fff; border-radius:20px; box-shadow:0 8px 32px rgba(43,45,127,0.10); 
    margin:40px auto; max-width:600px; padding:40px; 
  }
  
  .form-header { background:linear-gradient(135deg,#2b2d7f,#3b3f8f); color:#fff; padding:25px; text-align:center; border-radius:20px 20px 0 0; }
  .form-header h3 { margin:0; font-size:24px; font-weight:600; }
  
  .form-group label { font-weight:700; color:#2b2d7f; margin-bottom:8px; }
  
  .form-control-modern, .select-modern { width:100%; height:50px; border-radius:10px; border:2px solid #e9ecef; padding:12px 18px; font-size:16px; margin-bottom:20px; }
  .form-control-modern:disabled { background:#e9ecef; opacity:0.7; cursor:not-allowed; }
  
  /* Estatus / área actual */
  .current-status, .area-status { 
    background:linear-gradient(135deg,#e3f2fd,#bbdefb); border:4px solid #2196f3; 
    color:#0d47a1; padding:15px 20px; border-radius:12px; font-weight:700; margin-bottom:15px;
    display:flex; align-items:center; font-size:16px; 
  }
  .area-status { background:linear-gradient(135deg,#e8f5e8,#c8e6c9); border-color:#4caf50; color:#2e7d32; }
  .current-status i, .area-status i { margin-right:10px; font-size:18px; background:white; padding:5px; border-radius:50%; border:2px solid #2196f3; }
  
  /* Botones */
  .btn-actions { text-align:center; margin-top:20px; }
  .btn-save-modern { background:linear-gradient(135deg,#28a745,#20c997); color:#fff; padding:12px 30px; border:none; border-radius:10px; font-weight:600; margin-right:10px; }
  .btn-cancel-modern { background:linear-gradient(135deg,#dc3545,#c82333); color:#fff; padding:12px 30px; border:none; border-radius:10px; font-weight:600; }
  .btn-warning { background:#2b2d7f; color:#fff; border:none; padding:12px 28px; border-radius:10px; margin-right:10px; }
  .btn-warning:hover { background:#1a1c4c; }
  .btn-danger { background:#dc3545; color:#fff; border:none; padding:12px 28px; border-radius:10px; }
</style>
</head>
<body>

<section class="content container-fluid">

  <!-- ====================== ELIMINAR CAMA ====================== -->
  <div class="elimina-cama-box">
    <h3><i class="fas fa-trash-alt"></i> Eliminar cama</h3>
    <form id="form-eliminar">
      <div class="form-group">
        <label>Número de cama:</label>
        <input type="text" class="form-control-modern" value="101" disabled>
      </div>
      <div class="form-group">
        <label>Estatus:</label>
        <input type="text" class="form-control-modern" value="LIBRE" disabled>
      </div>
      <div class="form-group">
        <label>Tipo:</label>
        <input type="text" class="form-control-modern" value="HOSPITALIZACIÓN" disabled>
      </div>
      <div class="form-group">
        <label>Piso:</label>
        <input type="text" class="form-control-modern" value="2" disabled>
      </div>
      <div class="form-group">
        <label>Sección:</label>
        <input type="text" class="form-control-modern" value="3" disabled>
      </div>
      <div class="form-group btn-actions">
        <button type="button" class="btn-warning" onclick="alert('Cama eliminada correctamente')">
          <i class="fas fa-trash-alt"></i> Eliminar
        </button>
        <button type="button" class="btn-danger">Cancelar</button>
      </div>
    </form>
  </div>

  <!-- ====================== EDITAR CAMA ====================== -->
  <div class="form-container">
    <div class="form-header">
      <h3><i class="fas fa-edit"></i> Editar cama</h3>
    </div>
    <form id="form-editar">
      <div class="form-group">
        <label>Número de cama:</label>
        <input type="text" class="form-control-modern" value="101" disabled>
      </div>
      <div class="form-group">
        <label>Estatus actual:</label>
        <div class="current-status"><i class="fas fa-info-circle"></i> LIBRE</div>
        <select name="estatus" class="select-modern">
          <option value="LIBRE">LIBRE</option>
          <option value="MANTENIMIENTO">MANTENIMIENTO</option>
        </select>
      </div>
      <div class="form-group">
        <label>Área actual:</label>
        <div class="area-status"><i class="fas fa-map-marker-alt"></i> HOSPITALIZACIÓN</div>
        <select name="tipo" class="select-modern">
          <option value="HOSPITALIZACIÓN">HOSPITALIZACIÓN</option>
          <option value="OBSERVACIÓN">OBSERVACIÓN</option>
          <option value="TERAPIA INTENSIVA">TERAPIA INTENSIVA</option>
          <option value="ENDOSCOPÍA">ENDOSCOPÍA</option>
          <option value="CONSULTA">CONSULTA</option>
        </select>
      </div>
      <div class="form-group">
        <label>Piso:</label>
        <input type="number" name="piso" class="form-control-modern" value="2">
      </div>
      <div class="form-group">
        <label>Sección:</label>
        <input type="number" name="seccion" class="form-control-modern" value="3">
      </div>
      <div class="form-group btn-actions">
        <button type="button" class="btn-save-modern" onclick="alert('Cama editada correctamente')">
          <i class="fas fa-save"></i> Guardar
        </button>
        <button type="button" class="btn-cancel-modern">Cancelar</button>
      </div>
    </form>
  </div>

</section>

</body>
</html>
