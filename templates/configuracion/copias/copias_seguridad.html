<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Copia de Seguridad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4 text-center">
        <h3 class="mb-3">📦 Copia de Seguridad</h3>

        {% if archivo %}
            <div class="alert alert-success">
                Respaldo creado correctamente:<br>
                <strong>{{ archivo }}</strong>
            </div>
        {% endif %}

        <a href="{{ url_for('copias_seguridad') }}" class="btn btn-primary">
            Crear nueva copia
        </a>
    </div>
</div>

</body>
</html>
