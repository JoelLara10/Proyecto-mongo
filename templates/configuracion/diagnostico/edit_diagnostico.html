{% extends "configuracion/header_configuracion.html" %}

{% block content %}

<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-8">

            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">
                        <i class="fas fa-edit"></i> Editar Diagnóstico
                    </h5>
                </div>

                <div class="card-body">
                    <form method="POST">

                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fas fa-stethoscope"></i> Diagnóstico
                            </label>
                            <input type="text"
                                   name="diag"
                                   class="form-control"
                                   value="{{ diagnostico.diag }}"
                                   required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                <i class="fas fa-code"></i> Código CIE-10
                            </label>
                            <input type="text"
                                   name="id_cie10"
                                   class="form-control"
                                   value="{{ diagnostico.id_cie10 }}"
                                   required>
                        </div>

                        <div class="text-center mt-4">
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-save"></i> Guardar
                            </button>

                            <a href="{{ url_for('listar_diagnosticos') }}"
                               class="btn btn-danger">
                                <i class="fas fa-times"></i> Cancelar
                            </a>
                        </div>

                    </form>
                </div>
            </div>

        </div>
    </div>
</div>

{% endblock %}
