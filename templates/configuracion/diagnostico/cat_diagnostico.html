{% extends "configuracion/header_configuracion.html" %}

{% block content %}

<div class="container-fluid">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>
            <i class="fas fa-diagnoses"></i>
            Catálogo de Diagnósticos
        </h3>

        <button class="btn btn-primary" data-toggle="modal" data-target="#modalDiag">
            <i class="fas fa-plus"></i> Nuevo Diagnóstico
        </button>
    </div>

    <!-- BUSCADOR -->
    <div class="mb-3">
        <input type="text"
               class="form-control"
               id="search"
               placeholder="🔍 Buscar diagnóstico o CIE-10">
    </div>

    <!-- TABLA -->
    <div class="card">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover mb-0" id="mytable">
                    <thead class="bg-primary text-white">
                        <tr>
                            <th>ID</th>
                            <th>Diagnóstico</th>
                            <th>CIE-10</th>
                            <th class="text-center">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% for d in diagnosticos %}
                        <tr>
                            <td>{{ d.id_diag }}</td>
                            <td><strong>{{ d.diag }}</strong></td>
                            <td>{{ d.id_cie10 }}</td>
                            <td class="text-center">
                                <a href="{{ url_for('editar_diagnostico', id=d.id_diag) }}"
                                   class="btn btn-sm btn-warning">
                                    <i class="fas fa-edit"></i>
                                </a>
                            </td>
                        </tr>
                        {% else %}
                        <tr>
                            <td colspan="4" class="text-center text-muted">
                                No hay diagnósticos registrados
                            </td>
                        </tr>
                        {% endfor %}
                    </tbody>
                </table>
            </div>
        </div>
    </div>

</div>

<!-- BUSCADOR SCRIPT (compatible con Bootstrap 4) -->
<script>
document.getElementById("search").addEventListener("keyup", function () {
    let value = this.value.toLowerCase();
    let rows = document.querySelectorAll("#mytable tbody tr");

    rows.forEach(row => {
        row.style.display =
            row.textContent.toLowerCase().includes(value) ? "" : "none";
    });
});
</script>

{% endblock %}
