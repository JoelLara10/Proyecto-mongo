<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Catálogo de Diagnósticos</title>
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
<link rel="stylesheet" href="https://use.fontawesome.com/releases/v5.7.0/css/all.css">
<style>
body {
    background-color: #f8f9fa;
    padding: 30px;
}
.header-section h2 {
    margin-bottom: 20px;
    font-weight: 700;
}
.action-buttons {
    margin-bottom: 20px;
}
.search-section {
    margin-bottom: 20px;
}
.search-input {
    width: 300px;
    display: inline-block;
}
.table-container {
    background: #fff;
    padding: 20px;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0,0,0,0.1);
}
.modal-header {
    background-color: #007bff;
    color: white;
}
.modal-footer button {
    min-width: 100px;
}
</style>
</head>
<body>

<div class="container">

    <!-- HEADER -->
    <div class="header-section">
        <h2><i class="fas fa-diagnoses"></i> CATÁLOGO DE DIAGNÓSTICOS</h2>
    </div>

    <!-- BOTÓN NUEVO -->
    <div class="action-buttons">
        <button type="button" class="btn btn-primary" data-toggle="modal" data-target="#modalDiag">
            <i class="fas fa-plus"></i> Nuevo Diagnóstico
        </button>
    </div>

    <!-- BUSCADOR -->
    <div class="search-section">
        <input type="text" class="form-control search-input" id="search" placeholder="🔍 Buscar diagnóstico">
    </div>

    <!-- TABLA -->
    <div class="table-container">
    <table class="table table-hover table-bordered" id="mytable">
        <thead class="thead-dark">
            <tr>
                <th>ID</th>
                <th>Diagnóstico</th>
                <th>CIE-10</th>
                <th>Acciones</th> <!-- Nueva columna -->
            </tr>
        </thead>
        <tbody>
            {% for d in diagnosticos %}
            <tr>
                <td>{{ d.id_diag }}</td>
                <td><strong>{{ d.diagnostico }}</strong></td>
                <td>{{ d.id_cie10 }}</td>
                <td>
                    <!-- Botón de editar -->
                    <a href="{{ url_for('editar_diagnostico', id=d.id_diag) }}"
                       class="btn btn-sm btn-warning" title="Editar">
                        <i class="fas fa-edit"></i>
                    </a>
                </td>
            </tr>
            {% else %}
            <tr>
                <td colspan="4" class="text-center">No hay diagnósticos registrados</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    </div>

</div>

<!-- MODAL -->
<div class="modal fade" id="modalDiag" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <form action="{{ url_for('insertar_diagnostico') }}" method="POST">
                <div class="modal-header">
                    <h5 class="modal-title"><i class="fas fa-plus-circle"></i> Nuevo Diagnóstico</h5>
                    <button type="button" class="close text-white" data-dismiss="modal">&times;</button>
                </div>
                <div class="modal-body">
                    <div class="form-group">
                        <label>Diagnóstico</label>
                        <input type="text" name="diag" class="form-control" required>
                    </div>
                    <div class="form-group">
                        <label>Código CIE-10</label>
                        <input type="text" name="id_cie10" class="form-control" required>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-success"><i class="fas fa-save"></i> Guardar</button>
                    <button type="button" class="btn btn-danger" data-dismiss="modal">Cancelar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<!-- JS -->
<script src="https://code.jquery.com/jquery-3.5.1.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
<script>
$("#search").keyup(function () {
    var value = $(this).val().toLowerCase();
    $("#mytable tbody tr").filter(function () {
        $(this).toggle($(this).text().toLowerCase().indexOf(value) > -1)
    });
});
</script>

</body>
</html>
