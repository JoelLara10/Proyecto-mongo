{% extends 'enfermeria/header_enfermeria.html' %}

{% block content %}

<section class="content-header">
    <div class="container-fluid">
        <div class="page-header" style="background:rgba(255,255,255,.1);backdrop-filter:blur(10px);border-radius:15px;padding:1.2rem;">
            <h1 class="text-white mb-0">
                <i class="fas fa-droplet me-3"></i>
                Balance Hídrico
            </h1>
        </div>
    </div>
</section>

<section class="content">
<div class="container-fluid">

    <div class="main-card">

        <div class="card-header-custom">
            <h5 class="mb-0">
                <i class="fas fa-water me-2"></i>
                Registro de Balance Hídrico
            </h5>
        </div>

        <form method="POST">
            <div class="card-body-custom">

                <div class="row g-3">

                    <div class="col-md-4">
                        <label class="form-label">Líquidos ingeridos (ml)</label>
                        <input type="number" name="ingresos" class="form-control" placeholder="Ej. 500">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Sueros administrados (ml)</label>
                        <input type="number" name="sueros" class="form-control" placeholder="Ej. 1000">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Orina (ml)</label>
                        <input type="number" name="orina" class="form-control" placeholder="Ej. 700">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Vómito (ml)</label>
                        <input type="number" name="vomito" class="form-control" placeholder="Ej. 0">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Drenajes (ml)</label>
                        <input type="number" name="drenajes" class="form-control" placeholder="Ej. 0">
                    </div>

                    <div class="col-md-4">
                        <label class="form-label">Balance final</label>
                        <input type="text" name="balance" class="form-control" placeholder="Ej. Positivo / Negativo">
                    </div>

                    <div class="col-12">
                        <label class="form-label">Observaciones</label>
                        <textarea name="observaciones" rows="4" class="form-control"></textarea>
                    </div>

                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a href="{{ url_for('enfermeria') }}" class="btn btn-secondary">
                        <i class="fas fa-arrow-left me-2"></i>
                        Regresar
                    </a>

                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-2"></i>
                        Guardar balance
                    </button>
                </div>

            </div>
        </form>

    </div>

</div>
</section>

{% endblock %}
