{% extends 'enfermeria/header_enfermeria.html' %}

{% block content %}

<section class="content-header">
    <div class="container-fluid">
        <div class="page-header" style="background:rgba(255,255,255,.1);backdrop-filter:blur(10px);border-radius:15px;padding:1.2rem;">
            <h1 class="text-white mb-0">
                <i class="fas fa-pills me-3"></i>
                Administración de Medicamentos
            </h1>
        </div>
    </div>
</section>

<section class="content">
<div class="container-fluid">

    <div class="main-card">

        <div class="card-header-custom">
            <h5 class="mb-0">
                <i class="fas fa-capsules me-2"></i>
                Registro de Medicamentos
            </h5>
        </div>

        <form method="POST">
            <div class="card-body-custom">

                <div class="row g-3">

                    <div class="col-md-6">
                        <label class="form-label">Medicamento</label>
                        <input type="text" name="medicamento" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Dosis</label>
                        <input type="text" name="dosis" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Vía de administración</label>
                        <select name="via" class="form-control" required>
                            <option value="">Selecciona una opción</option>
                            <option value="Oral">Oral</option>
                            <option value="Intravenosa">Intravenosa</option>
                            <option value="Intramuscular">Intramuscular</option>
                            <option value="Subcutánea">Subcutánea</option>
                            <option value="Tópica">Tópica</option>
                            <option value="Inhalatoria">Inhalatoria</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Hora de aplicación</label>
                        <input type="time" name="hora" class="form-control" required>
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Responsable</label>
                        <input type="text" name="responsable" class="form-control" value="{{ session.get('username', '') }}">
                    </div>

                    <div class="col-md-6">
                        <label class="form-label">Frecuencia</label>
                        <input type="text" name="frecuencia" class="form-control" placeholder="Ej. Cada 8 horas">
                    </div>

                    <div class="col-12">
                        <label class="form-label">Observaciones</label>
                        <textarea name="observaciones" rows="4" class="form-control"></textarea>
                    </div>

                </div>

                <div class="d-flex justify-content-end gap-2 mt-4">
                    <a href="{{ url_for('enfermeria') }}" class="btn btn-secondary">
                        <i class="fas fa-arrow-left me-2"></i>
                        Regresar
                    </a>

                    <button type="submit" class="btn btn-primary">
                        <i class="fas fa-save me-2"></i>
                        Guardar medicamento
                    </button>
                </div>

            </div>
        </form>

    </div>

</div>
</section>

{% endblock %}
