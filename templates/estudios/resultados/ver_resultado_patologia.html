<div>

  <div class="mb-3">
    <h4><strong>Resultados de Patología</strong></h4>
  </div>

  <div class="mb-3">
    <a href="{{ url_for('estudios.estudios_home', vista='resultados_patologia') }}"
       class="btn btn-sm btn-outline-danger">
      Regresar
    </a>
  </div>

  <div class="row">

    <!-- Lista de archivos -->
    <div class="col-md-4">
      <h6><strong>Archivos disponibles</strong></h6>
        <ul class="list-group">
            <li class="list-group-item">
                <a href="#"
                class="resultado-link"
                data-type="pdf"
                data-src="/static/resultados/patologia/resultado_1.pdf">
                Resultado 1 (PDF)
                </a>
            </li>

            <li class="list-group-item">
                <a href="#"
                class="resultado-link"
                data-type="img"
                data-src="/static/resultados/patologia/resultado_2.jpg">
                Resultado 2 (Imagen)
                </a>
            </li>
        </ul>

    </div>

    <!-- Vista previa -->
    <div class="col-md-8">
      <h6><strong>Vista previa</strong></h6>
      <div id="preview-area" class="border rounded p-2" style="min-height:400px;">
            <p class="text-muted text-center mt-5">
                Selecciona un archivo para visualizarlo
            </p>
      </div>
    </div>
  </div>
</div>
<script>
  document.querySelectorAll('.resultado-link').forEach(link => {
    link.addEventListener('click', function (e) {
      e.preventDefault();

      const type = this.dataset.type;
      const src = this.dataset.src;
      const preview = document.getElementById('preview-area');

      preview.innerHTML = '';

      if (type === 'pdf') {
        preview.innerHTML = `
          <img src="${src}"
               style="max-width:100%; max-height:400px;">
        `;
      } else {
        preview.innerHTML = `
          <img src="${src}"
               style="max-width:100%; max-height:400px;">
        `;
      }
    });
  });
</script>
