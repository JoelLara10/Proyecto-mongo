<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - INEO</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Toastr -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .navbar {
            background-color: #1e3c72;
        }

        .navbar-brand,
        .navbar-text {
            color: #ffffff !important;
        }

        .card {
            border-radius: 15px;
            transition: transform 0.2s ease-in-out;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .badge-notification {
            position: absolute;
            top: -8px;
            right: -8px;
            font-size: 0.7rem;
            padding: 3px 7px;
        }

        .card-with-badge {
            position: relative;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg shadow">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">INEO</span>

        <div class="ms-auto">
            <span class="navbar-text me-3">
                <i class="bi bi-person-circle"></i>
                {{ session['username'] }} ({{ role|capitalize }})
            </span>
            <a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm">
                <i class="bi bi-box-arrow-right"></i> Cerrar sesión
            </a>
        </div>
    </div>
</nav>

<!-- CONTENIDO -->
<div class="container mt-5">
    <h3 class="mb-4">Menú Principal</h3>

    <div class="row">
        {% for option in menu_options %}
        <div class="col-md-4 mb-4">
            <div class="card shadow-sm h-100 card-with-badge">
                <div class="card-body text-center">
                    <i class="bi bi-grid fs-1 text-primary"></i>
                    <h5 class="card-title mt-3">{{ option.name }}</h5>

                    {% if option.name == 'Estudios' and total_pendientes > 0 %}
                    <span class="position-absolute top-0 end-0 badge bg-danger rounded-pill badge-notification">
                        {{ total_pendientes }}
                    </span>
                    {% endif %}

                    <a href="{{ option.url }}" class="btn btn-primary mt-2">
                        Acceder
                    </a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>

<script>
    // =======================
    // NOTIFICACIÓN DE PENDIENTES
    // =======================
    $(document).ready(function() {
        {% if total_pendientes > 0 %}
        setTimeout(function() {
            toastr.options = {
                closeButton: true,
                progressBar: true,
                positionClass: "toast-top-right",
                timeOut: "10000"
            };

            let message = "Tienes {{ total_pendientes }} solicitud(es) pendiente(s)";
            {% if lab_pendientes > 0 and gab_pendientes > 0 %}
                message = "{{ lab_pendientes }} de Laboratorio y {{ gab_pendientes }} de Gabinete pendientes";
            {% elif lab_pendientes > 0 %}
                message = "{{ lab_pendientes }} solicitud(es) de Laboratorio pendientes";
            {% elif gab_pendientes > 0 %}
                message = "{{ gab_pendientes }} solicitud(es) de Gabinete pendientes";
            {% endif %}

            toastr.warning(message, "Solicitudes Pendientes");
        }, 1500);
        {% endif %}
    });

    // =======================
    // NOTIFICACIONES POR LOGS
    // =======================
    let ultimaFechaLog = null;

    function verificarLogs() {
        fetch('/logs/ultimo')
            .then(response => response.json())
            .then(data => {
                if (!data || !data.fecha) return;
                if (ultimaFechaLog === data.fecha) return;

                ultimaFechaLog = data.fecha;

                toastr.options = {
                    closeButton: true,
                    progressBar: true,
                    positionClass: "toast-top-right",
                    timeOut: "6000"
                };

                if (data.accion.toLowerCase().includes('elimin')) {
                    toastr.error(data.accion, "Acción de " + data.usuario);
                } else if (data.accion.toLowerCase().includes('agreg')) {
                    toastr.success(data.accion, "Acción de " + data.usuario);
                } else {
                    toastr.info(data.accion, "Actividad del sistema");
                }
            })
            .catch(error => console.error('Error logs:', error));
    }

    // Verificar logs cada 5 segundos
    setInterval(verificarLogs, 5000);
</script>

<script>
let ultimoLog = null;

function revisarLogs() {
    fetch('/logs/ultimo')
        .then(res => res.json())
        .then(data => {
            if (!data.nuevo) return;

            const actual = data.usuario + data.accion + data.fecha;

            if (actual !== ultimoLog) {
                ultimoLog = actual;

                toastr.info(
                    `${data.usuario}: ${data.accion}`,
                    'Actividad del sistema'
                );
            }
        });
}

// Revisar cada 5 segundos
setInterval(revisarLogs, 5000);
</script>


</body>
</html>
