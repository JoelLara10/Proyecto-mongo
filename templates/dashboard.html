<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - INEO</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Toastr -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.css" rel="stylesheet">

    <style>
        body {
            background-color: #f4f6f9;
        }

        .navbar {
            background-color: #1e3c72;
        }

        .navbar-brand,
        .navbar-text {
            color: #ffffff !important;
        }

        .card {
            border-radius: 15px;
            transition: transform 0.2s ease-in-out;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .badge-notification {
            position: absolute;
            top: -8px;
            right: -8px;
            font-size: 0.7rem;
            padding: 3px 7px;
        }

        .card-with-badge {
            position: relative;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg shadow">
    <div class="container-fluid">
        <span class="navbar-brand fw-bold">INEO</span>

        <div class="ms-auto">
            <span class="navbar-text me-3">
                <i class="bi bi-person-circle"></i>
                {{ session['username'] }} ({{ role|capitalize }})
            </span>
            <a href="{{ url_for('logout') }}" class="btn btn-outline-light btn-sm">
                <i class="bi bi-box-arrow-right"></i> Cerrar sesión
            </a>
        </div>
    </div>
</nav>

<!-- CONTENIDO -->
<div class="container mt-5">
    <h3 class="mb-4">Menú Principal</h3>

    <div class="row">
        {% for option in menu_options %}
        <div class="col-md-4 mb-4">
            <div class="card shadow-sm h-100 card-with-badge">
                <div class="card-body text-center">
                    <i class="bi bi-grid fs-1 text-primary"></i>
                    <h5 class="card-title mt-3">{{ option.name }}</h5>

                    {% if option.name == 'Estudios' %}
                    <span id="pendientes-badge" 
                        class="position-absolute top-0 end-0 badge bg-danger rounded-pill badge-notification"
                        {% if total_pendientes == 0 %}style="display: none;"{% endif %}>
                        {{ total_pendientes }}
                    </span>
                    {% endif %}

                    <a href="{{ option.url }}" class="btn btn-primary mt-2">
                        Acceder
                    </a>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<!-- JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/toastr.js/latest/toastr.min.js"></script>

<script>
    // Configuración global de Toastr
    toastr.options = {
        closeButton: true,
        progressBar: true,
        positionClass: "toast-top-right",
        timeOut: 6000,
        extendedTimeOut: 3000
    };

    $(document).ready(function() {
        // Estado inicial (valores pasados desde el backend)
        let ultimosPendientes = {
            lab: {{ lab_pendientes }},
            gab: {{ gab_pendientes }},
            total: {{ total_pendientes }}
        };
        let ultimaNotificacionPendientes = Date.now();
        const INTERVALO_PENDIENTES = 30000; // 30 segundos
        const COOLDOWN_NOTIFICACION = 300000; // 5 minutos

        // Notificación inicial si hay pendientes
        if (ultimosPendientes.total > 0) {
            setTimeout(() => {
                mostrarNotificacion(ultimosPendientes.lab, ultimosPendientes.gab, ultimosPendientes.total);
            }, 1500);
        }

        // Función para mostrar la notificación de pendientes
        function mostrarNotificacion(lab, gab, total) {
            let message = `Tienes ${total} solicitud(es) pendiente(s)`;
            if (lab > 0 && gab > 0) {
                message = `${lab} de Laboratorio y ${gab} de Gabinete pendientes`;
            } else if (lab > 0) {
                message = `${lab} solicitud(es) de Laboratorio pendientes`;
            } else if (gab > 0) {
                message = `${gab} solicitud(es) de Gabinete pendientes`;
            }
            toastr.warning(message, "Solicitudes Pendientes");
        }

        // Actualizar el badge de la tarjeta Estudios
        function actualizarBadge(total) {
            const badge = document.getElementById('pendientes-badge');
            if (badge) {
                if (total > 0) {
                    badge.textContent = total;
                    badge.style.display = 'inline-block';
                } else {
                    badge.style.display = 'none';
                }
            }
        }

        // Consultar el endpoint de pendientes
        function verificarPendientes() {
            // Usamos url_for para generar la ruta correcta (ajusta si es necesario)
            fetch("{{ url_for('estudios.api_pendientes') }}")
                .then(response => response.json())
                .then(data => {
                    console.log("Pendientes actuales:", data); // Para depuración
                    const ahora = Date.now();

                    actualizarBadge(data.total_pendientes);

                    if (data.total_pendientes > 0) {
                        // Si aumentó el número, notificar inmediatamente
                        if (data.total_pendientes > ultimosPendientes.total) {
                            mostrarNotificacion(data.lab_pendientes, data.gab_pendientes, data.total_pendientes);
                            ultimaNotificacionPendientes = ahora;
                        }
                        // Si sigue igual pero ha pasado el cooldown, recordatorio
                        else if (ahora - ultimaNotificacionPendientes > COOLDOWN_NOTIFICACION) {
                            mostrarNotificacion(data.lab_pendientes, data.gab_pendientes, data.total_pendientes);
                            ultimaNotificacionPendientes = ahora;
                        }
                    }

                    ultimosPendientes = {
                        lab: data.lab_pendientes,
                        gab: data.gab_pendientes,
                        total: data.total_pendientes
                    };
                })
                .catch(error => console.error('Error al consultar pendientes:', error));
        }

        // ===== NOTIFICACIONES DE LOGS (opcional, ya lo tenías) =====
        let ultimaFechaLog = null;

        function verificarLogs() {
            fetch('/logs/ultimo')
                .then(response => response.json())
                .then(data => {
                    if (!data || !data.fecha) return;
                    if (ultimaFechaLog === data.fecha) return;
                    ultimaFechaLog = data.fecha;

                    if (data.accion.toLowerCase().includes('elimin')) {
                        toastr.error(data.accion, "Acción de " + data.usuario);
                    } else if (data.accion.toLowerCase().includes('agreg')) {
                        toastr.success(data.accion, "Acción de " + data.usuario);
                    } else {
                        toastr.info(data.accion, "Actividad del sistema");
                    }
                })
                .catch(error => console.error('Error logs:', error));
        }

        // Iniciar intervalos
        setInterval(verificarPendientes, INTERVALO_PENDIENTES);
        setInterval(verificarLogs, 5000);

        // Ejecutar una vez al inicio para sincronizar el badge
        verificarPendientes();
    });
</script>
</body>
</html>
