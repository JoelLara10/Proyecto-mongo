<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Nuevo Paciente - INEO</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- Bootstrap 5 -->
<link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet">

<!-- Bootstrap Icons -->
<link href="{{ url_for('static', filename='css/bootstrap-icons.css') }}" rel="stylesheet">

<!-- Font Awesome -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/all.min.css') }}">

<!-- Google Fonts - Inter (solo para la fuente) -->
<link href="{{ url_for('static', filename='css/fonts.css') }}" rel="stylesheet">

    <style>
        * {
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }

        /* Navbar glassmorphism */
        .navbar {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            padding: 0.8rem 0;
            margin-bottom: 2rem;
            border-radius: 0 0 20px 20px;
        }

        .navbar-brand {
            color: #2d3748 !important;
            font-weight: 700;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .navbar-text {
            color: #4a5568 !important;
            font-weight: 500;
        }

        .btn-outline-light {
            border: 1px solid #e2e8f0;
            color: #4a5568;
            border-radius: 10px;
            padding: 0.5rem 1.2rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .btn-outline-light:hover {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-color: transparent;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        /* Buscador de pacientes */
        .search-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: none;
            border-radius: 20px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
        }

        .search-label {
            color: #2d3748;
            font-weight: 600;
            margin-bottom: 0.8rem;
            font-size: 1.1rem;
        }

        .search-label i {
            color: #667eea;
            margin-right: 0.5rem;
        }

        .search-input {
            border: 2px solid #e2e8f0;
            border-radius: 15px;
            padding: 0.8rem 1.2rem;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
            outline: none;
        }

        .resultados-list {
            margin-top: 0.5rem;
            border-radius: 15px;
            overflow: hidden;
        }

        .resultado-item {
            background: white;
            border: 1px solid #e2e8f0;
            padding: 0.8rem 1.2rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .resultado-item:hover {
            background: #f7fafc;
            transform: translateX(5px);
            border-left: 3px solid #667eea;
        }

        /* Card principal */
        .main-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: none;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            margin-bottom: 2rem;
        }

        .card-header-custom {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 1.5rem;
            color: white;
        }

        .card-header-custom h5 {
            margin: 0;
            font-weight: 600;
            font-size: 1.2rem;
        }

        .card-header-custom i {
            margin-right: 0.8rem;
        }

        .card-body-custom {
            padding: 2rem;
        }

        /* Títulos de sección */
        .section-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin: 1.5rem 0 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid;
            display: flex;
            align-items: center;
        }

        .section-title i {
            margin-right: 0.8rem;
            font-size: 1.3rem;
        }

        .section-title.paciente {
            color: #4299e1;
            border-bottom-color: #4299e1;
        }

        .section-title.atencion {
            color: #48bb78;
            border-bottom-color: #48bb78;
        }

        .section-title.medica {
            color: #ed8936;
            border-bottom-color: #ed8936;
        }

        .section-title.familiar {
            color: #f56565;
            border-bottom-color: #f56565;
        }

        /* Formulario */
        .form-label-custom {
            font-weight: 600;
            color: #4a5568;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .form-label-custom i {
            color: #667eea;
            margin-right: 0.5rem;
        }

        .form-control-custom, .form-select-custom {
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            padding: 0.6rem 1rem;
            transition: all 0.3s ease;
            background: white;
        }

        .form-control-custom:focus, .form-select-custom:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.2);
            outline: none;
        }

        .form-control-custom[readonly] {
            background: #f7fafc;
            cursor: not-allowed;
        }

        /* Botones */
        .btn-custom {
            padding: 0.8rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            transition: all 0.3s ease;
            border: none;
        }

        .btn-custom i {
            margin-right: 0.5rem;
        }

        .btn-save {
            background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(72, 187, 120, 0.3);
        }

        .btn-save:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(72, 187, 120, 0.4);
        }

        .btn-cancel {
            background: white;
            color: #718096;
            border: 2px solid #e2e8f0;
        }

        .btn-cancel:hover {
            background: #f7fafc;
            color: #4a5568;
            transform: translateY(-2px);
        }

        /* Animaciones */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .search-card, .main-card {
            animation: fadeInUp 0.6s ease forwards;
        }

        /* Badges */
        .badge-required {
            background: #f56565;
            color: white;
            font-size: 0.7rem;
            padding: 0.2rem 0.5rem;
            border-radius: 10px;
            margin-left: 0.5rem;
        }
    </style>
</head>

<body>

<!-- NAVBAR MEJORADO -->
<nav class="navbar navbar-expand-lg">
    <div class="container-fluid px-4">
        <a href="{{ url_for('gestion_pacientes') }}" class="btn btn-outline-light me-3">
            <i class="bi bi-arrow-left me-2"></i>Gestión Pacientes
        </a>

        <span class="navbar-brand fw-semibold fs-4">
            <i class="fas fa-user-plus me-2" style="color: #667eea;"></i>
            Nuevo Paciente
        </span>

        <div class="ms-auto d-flex align-items-center">
            <span class="navbar-text me-4">
                <i class="bi bi-person-circle me-2" style="color: #667eea;"></i>
                <span class="fw-medium">{{ session['username'] }}</span>
                <span class="badge bg-primary ms-2" style="background: linear-gradient(135deg, #667eea 0%, #764ba2 100%) !important;">
                    {{ session['role']|capitalize }}
                </span>
            </span>

            <a href="{{ url_for('logout') }}" class="btn btn-outline-light">
                <i class="bi bi-box-arrow-right me-2"></i>Salir
            </a>
        </div>
    </div>
</nav>

<!-- CONTENIDO PRINCIPAL -->
<div class="container">

    <!-- BUSCADOR DE PACIENTES MEJORADO -->
    <div class="search-card">
        <div class="search-label">
            <i class="fas fa-search"></i>
            Buscar paciente existente
        </div>
        <input type="text" id="buscarPaciente" class="form-control search-input"
               placeholder="Escribe CURP o nombre del paciente...">
        <div id="resultadosPacientes" class="resultados-list"></div>
        <small class="text-muted mt-2 d-block">
            <i class="fas fa-info-circle me-1"></i>
            Escribe al menos 3 caracteres para buscar
        </small>
    </div>

    <!-- FORMULARIO PRINCIPAL -->
    <form method="POST">
        <div class="main-card">
            <div class="card-header-custom">
                <h5>
                    <i class="fas fa-user-plus"></i>
                    Registro de Nuevo Paciente
                </h5>
            </div>

            <div class="card-body-custom">

                <!-- ================= DATOS DEL PACIENTE ================= -->
                <div class="section-title paciente">
                    <i class="fas fa-user-circle"></i>
                    Datos del Paciente
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <label class="form-label-custom">
                            <i class="fas fa-id-card"></i>
                            CURP <span class="badge-required">Requerido</span>
                        </label>
                        <input type="text" name="curp" id="curp" class="form-control form-control-custom"
                               maxlength="18" required placeholder="Ingrese CURP">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label-custom">
                            <i class="fas fa-user-tag"></i>
                            Apellido Paterno <span class="badge-required">Requerido</span>
                        </label>
                        <input type="text" name="papell" id="papell" class="form-control form-control-custom"
                               required placeholder="Primer apellido">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label-custom">
                            <i class="fas fa-user-tag"></i>
                            Apellido Materno
                        </label>
                        <input type="text" name="sapell" id="sapell" class="form-control form-control-custom"
                               placeholder="Segundo apellido">
                    </div>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label-custom">
                            <i class="fas fa-user"></i>
                            Nombre(s) <span class="badge-required">Requerido</span>
                        </label>
                        <input type="text" name="nom_pac" id="nom_pac" class="form-control form-control-custom"
                               required placeholder="Nombre completo">
                    </div>
                    <div class="col-md-3">
                        <label class="form-label-custom">
                            <i class="fas fa-calendar-alt"></i>
                            Fecha de nacimiento <span class="badge-required">Requerido</span>
                        </label>
                        <input type="date" name="fecnac" id="fecnac" class="form-control form-control-custom" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label-custom">
                            <i class="fas fa-phone"></i>
                            Teléfono
                        </label>
                        <input type="text" name="tel" id="tel" class="form-control form-control-custom"
                               placeholder="Teléfono de contacto">
                    </div>
                </div>

                <!-- ================= ATENCIÓN MÉDICA ================= -->
                <div class="section-title atencion">
                    <i class="fas fa-hospital"></i>
                    Atención Médica
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label-custom">
                            <i class="fas fa-clinic-medical"></i>
                            Área <span class="badge-required">Requerido</span>
                        </label>
                        <select name="area" class="form-select form-select-custom" required>
                            <option value="">Seleccione un área</option>
                            <option value="Hospitalizado">🏥 Hospitalizado</option>
                            <option value="Urgencias">🚑 Urgencias</option>
                            <option value="Ambulatorio">🚶 Ambulatorio</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label-custom">
                            <i class="fas fa-bed"></i>
                            Habitación / Cama
                        </label>
                        <select name="id_cama" class="form-select form-select-custom">
                            <option value="">Sin asignar</option>
                            {% for cama in camas %}
                                <option value="{{ cama.id_cama }}">Cama {{ cama.numero }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-6">
                        <label class="form-label-custom">
                            <i class="fas fa-notes-medical"></i>
                            Motivo de atención <span class="badge-required">Requerido</span>
                        </label>
                        <select name="motivo" class="form-select form-select-custom" required>
                            <option value="">Seleccione motivo</option>
                            <option value="Consulta general">Consulta general</option>
                            <option value="Urgencia">Urgencia</option>
                            <option value="Cirugía">Cirugía</option>
                            <option value="Chequeo rutinario">Chequeo rutinario</option>
                            <option value="Hospitalización">Hospitalización</option>
                        </select>
                    </div>
                    <div class="col-md-6">
                        <label class="form-label-custom">
                            <i class="fas fa-stethoscope"></i>
                            Especialidad <span class="badge-required">Requerido</span>
                        </label>
                        <select name="especialidad" class="form-select form-select-custom" required>
                            <option value="">Seleccione especialidad</option>
                            <option value="Medicina general">Medicina general</option>
                            <option value="Cardiología">Cardiología</option>
                            <option value="Pediatría">Pediatría</option>
                            <option value="Cirugía general">Cirugía general</option>
                            <option value="Traumatología">Traumatología</option>
                        </select>
                    </div>
                </div>

                <!-- ================= INFORMACIÓN MÉDICA ================= -->
                <div class="section-title medica">
                    <i class="fas fa-allergies"></i>
                    Información Médica
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-12">
                        <label class="form-label-custom">
                            <i class="fas fa-allergies"></i>
                            Alergias
                        </label>
                        <textarea name="alergias" class="form-control form-control-custom"
                                  rows="3" placeholder="Especifique alergias del paciente (medicamentos, alimentos, etc.)"></textarea>
                    </div>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <label class="form-label-custom">
                            <i class="fas fa-user-md"></i>
                            Médico tratante 1
                        </label>
                        <select name="medico1" class="form-select form-select-custom">
                            <option value="">Seleccionar médico</option>
                            {% for m in medicos %}
                                <option value="{{ m.id }}">Dr. {{ m.username }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label-custom">
                            <i class="fas fa-user-md"></i>
                            Médico tratante 2
                        </label>
                        <select name="medico2" class="form-select form-select-custom">
                            <option value="">Seleccionar médico</option>
                            {% for m in medicos %}
                                <option value="{{ m.id }}">Dr. {{ m.username }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label-custom">
                            <i class="fas fa-user-md"></i>
                            Médico tratante 3
                        </label>
                        <select name="medico3" class="form-select form-select-custom">
                            <option value="">Seleccionar médico</option>
                            {% for m in medicos %}
                                <option value="{{ m.id }}">Dr. {{ m.username }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <label class="form-label-custom">
                            <i class="fas fa-user-md"></i>
                            Médico tratante 4
                        </label>
                        <select name="medico4" class="form-select form-select-custom">
                            <option value="">Seleccionar médico</option>
                            {% for m in medicos %}
                                <option value="{{ m.id }}">Dr. {{ m.username }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label-custom">
                            <i class="fas fa-user-md"></i>
                            Médico tratante 5
                        </label>
                        <select name="medico5" class="form-select form-select-custom">
                            <option value="">Seleccionar médico</option>
                            {% for m in medicos %}
                                <option value="{{ m.id }}">Dr. {{ m.username }}</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>

                <!-- ================= FAMILIAR RESPONSABLE ================= -->
                <div class="section-title familiar">
                    <i class="fas fa-users"></i>
                    Familiar Responsable
                </div>

                <div class="row g-3 mb-4">
                    <div class="col-md-4">
                        <label class="form-label-custom">
                            <i class="fas fa-user"></i>
                            Nombre completo <span class="badge-required">Requerido</span>
                        </label>
                        <input type="text" name="fam_nombre" class="form-control form-control-custom"
                               required placeholder="Nombre del familiar">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label-custom">
                            <i class="fas fa-users-between-lines"></i>
                            Parentesco
                        </label>
                        <input type="text" name="fam_parentesco" class="form-control form-control-custom"
                               placeholder="Ej: Padre, Madre, Hermano">
                    </div>
                    <div class="col-md-4">
                        <label class="form-label-custom">
                            <i class="fas fa-phone"></i>
                            Teléfono
                        </label>
                        <input type="text" name="fam_tel" class="form-control form-control-custom"
                               placeholder="Teléfono de contacto">
                    </div>
                </div>

                <!-- ================= BOTONES ================= -->
                <div class="d-flex justify-content-end gap-3 mt-5">
                    <a href="{{ url_for('gestion_pacientes') }}" class="btn btn-custom btn-cancel">
                        <i class="fas fa-times"></i>
                        Cancelar
                    </a>
                    <button type="submit" class="btn btn-custom btn-save">
                        <i class="fas fa-save"></i>
                        Guardar Paciente
                    </button>
                </div>

            </div>
        </div>
    </form>
</div>

<!-- Scripts -->
<script src="{{ url_for('static', filename='js/jquery-3.6.0.min.js') }}"></script>
<script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}"></script>

<script>
// Búsqueda de pacientes en tiempo real
document.getElementById('buscarPaciente').addEventListener('keyup', function () {
    let q = this.value.trim();
    let resultados = document.getElementById('resultadosPacientes');

    if (q.length < 3) {
        resultados.innerHTML = '';
        return;
    }

    fetch(`/buscar-paciente?q=${encodeURIComponent(q)}`)
        .then(res => res.json())
        .then(data => {
            resultados.innerHTML = '';
            if (data.length === 0) {
                resultados.innerHTML = '<div class="resultado-item text-muted">No se encontraron pacientes</div>';
                return;
            }
            data.forEach(p => {
                let item = document.createElement('div');
                item.className = 'resultado-item';
                item.innerHTML = `
                    <i class="fas fa-user me-2 text-primary"></i>
                    <strong>${p.curp}</strong> - ${p.papell} ${p.sapell} ${p.nom_pac}
                `;
                item.onclick = () => cargarPaciente(p);
                resultados.appendChild(item);
            });
        })
        .catch(error => {
            console.error('Error:', error);
            resultados.innerHTML = '<div class="resultado-item text-danger">Error al buscar</div>';
        });
});

// Cargar datos del paciente seleccionado
function cargarPaciente(p) {
    document.getElementById('curp').value = p.curp || '';
    document.getElementById('papell').value = p.papell || '';
    document.getElementById('sapell').value = p.sapell || '';
    document.getElementById('nom_pac').value = p.nom_pac || '';

    // Formatear fecha si existe
    if (p.fecnac) {
        let fecha = p.fecnac.split('T')[0];
        document.getElementById('fecnac').value = fecha;
    }

    document.getElementById('tel').value = p.tel || '';

    // Limpiar resultados
    document.getElementById('resultadosPacientes').innerHTML = '';

    // Marcar campos como solo lectura
    ['curp', 'papell', 'sapell', 'nom_pac', 'fecnac', 'tel'].forEach(id => {
        document.getElementById(id).readOnly = true;
        document.getElementById(id).classList.add('bg-light');
    });

    // Mostrar notificación
    toastr.success('Paciente cargado exitosamente');
}

// Inicializar tooltips
$(function () {
    $('[data-toggle="tooltip"]').tooltip();
});
</script>

<!-- Toastr CSS -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/toastr.min.css') }}">

<!-- Toastr JS -->
<script src="{{ url_for('static', filename='js/toastr.min.js') }}"></script>
<script>
toastr.options = {
    closeButton: true,
    progressBar: true,
    positionClass: "toast-top-right",
    timeOut: 3000
};
</script>

</body>
</html>
